version: '3.9'

services:
  db:
    image: postgres:15
    container_name: guildhub_db
    restart: always
    environment:
      POSTGRES_DB: guildhub
      POSTGRES_USER: guildadmin
      POSTGRES_PASSWORD: supersecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: guildhub_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "1"
      SECRET_KEY: "replace-this-with-your-secret-key"
      DB_NAME: guildhub
      DB_USER: guildadmin
      DB_PASSWORD: supersecretpassword
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db

volumes:
  postgres_data:
